version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install npm dependencies (Playwright comes from the Nix flake)
    cmds:
      - npm ci
      # Symlink the Nix-store-installed playwright into node_modules so
      # ESM imports resolve. PLAYWRIGHT_NPM_PATH is set by the flake's
      # shellHook; package.json intentionally doesn't declare playwright.
      - mkdir -p node_modules
      - ln -sfT "$PLAYWRIGHT_NPM_PATH" node_modules/playwright

  test:
    desc: Run contract tests across Node, Bun, Deno, Chromium/Chrome, and WebKit
    cmds:
      - npx node --test --test-timeout=60000 tests/count.test.js tests/browser.test.js
      - npx bun test tests/bun.test.js
      - npx deno test --allow-read tests/deno.test.js

  coverage:
    desc: Run runtime matrix plus Node coverage (100% threshold)
    cmds:
      - npx bun test tests/bun.test.js
      - npx deno test --allow-read tests/deno.test.js
      - >-
        npx node --test --test-timeout=60000 --experimental-test-coverage
        --test-coverage-include='src/**'
        --test-coverage-lines=100
        --test-coverage-branches=100
        --test-coverage-functions=100
        tests/count.test.js tests/browser.test.js

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf .coverage .nyc_output coverage output playwright-report test-results

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf node_modules
