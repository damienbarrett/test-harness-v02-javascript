version: "3"

vars:
  TOOL_PATH:
    sh: printf '%s' "$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
  HARNESS_DIR:
    sh: printf '%s' "${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}"
  HARNESS_OUTPUT_DIR:
    sh: printf '%s' "${HARNESS_OUTPUT_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/outputs}"
  HARNESS_CACHE_DIR:
    sh: printf '%s' "${HARNESS_CACHE_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/cache}"
  NPM_CONFIG_CACHE:
    sh: printf '%s' "${NPM_CONFIG_CACHE:-${HARNESS_CACHE_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/cache}/javascript/library/npm}"
  PLAYWRIGHT_BROWSERS_PATH:
    sh: printf '%s' "${PLAYWRIGHT_BROWSERS_PATH:-${HARNESS_CACHE_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/cache}/javascript/library/playwright}"

env:
  PATH: "{{.TOOL_PATH}}"
  HARNESS_DIR: "{{.HARNESS_DIR}}"
  HARNESS_OUTPUT_DIR: "{{.HARNESS_OUTPUT_DIR}}"
  HARNESS_CACHE_DIR: "{{.HARNESS_CACHE_DIR}}"
  NPM_CONFIG_CACHE: "{{.NPM_CONFIG_CACHE}}"
  PLAYWRIGHT_BROWSERS_PATH: "{{.PLAYWRIGHT_BROWSERS_PATH}}"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies and browser runtimes
    cmds:
      - npm ci
      - |
        if [ "$(uname -s)" = "Linux" ]; then
          npx playwright install --with-deps chromium webkit
        else
          npx playwright install chromium webkit
        fi

  test:
    desc: Run contract tests across Node, Bun, Deno, Chromium, and WebKit
    cmds:
      - npx node --test --test-timeout=60000 tests/count.test.js tests/browser.test.js
      - npx bun test tests/bun.test.js
      - npx deno test --allow-read tests/deno.test.js

  coverage:
    desc: Run runtime matrix plus Node coverage (100% threshold)
    cmds:
      - npx bun test tests/bun.test.js
      - npx deno test --allow-read tests/deno.test.js
      - >-
        npx node --test --test-timeout=60000 --experimental-test-coverage
        --test-coverage-include='src/**'
        --test-coverage-lines=100
        --test-coverage-branches=100
        --test-coverage-functions=100
        tests/count.test.js tests/browser.test.js

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf .coverage .nyc_output coverage output "$HARNESS_OUTPUT_DIR/javascript/library" playwright-report test-results

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf node_modules "$NPM_CONFIG_CACHE" "$PLAYWRIGHT_BROWSERS_PATH" "{{.TASKFILE_DIR}}/.harness"
