version: "3"

vars:
  TOOL_PATH:
    sh: printf '%s' "$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
  HARNESS_DIR:
    sh: printf '%s' "${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}"
  HARNESS_OUTPUT_DIR:
    sh: printf '%s' "${HARNESS_OUTPUT_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/outputs}"
  HARNESS_CACHE_DIR:
    sh: printf '%s' "${HARNESS_CACHE_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/cache}"
  NPM_CONFIG_CACHE:
    sh: printf '%s' "${NPM_CONFIG_CACHE:-${HARNESS_CACHE_DIR:-${HARNESS_DIR:-{{.TASKFILE_DIR}}/.harness}/cache}/javascript/component/npm}"
  WIT_PATH: "../../common/wit/tasks.wit"
  WORLD_NAME: "task-component"
  OUTPUT_WASM: "task-component.wasm"

env:
  PATH: "{{.TOOL_PATH}}"
  HARNESS_DIR: "{{.HARNESS_DIR}}"
  HARNESS_OUTPUT_DIR: "{{.HARNESS_OUTPUT_DIR}}"
  HARNESS_CACHE_DIR: "{{.HARNESS_CACHE_DIR}}"
  NPM_CONFIG_CACHE: "{{.NPM_CONFIG_CACHE}}"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - npm ci

  build:
    desc: Build the WASM component and transpile for testing
    cmds:
      - npx jco componentize src/app.js --wit {{.WIT_PATH}} -n {{.WORLD_NAME}} -d all --enable clocks --enable random --enable stdio -o {{.OUTPUT_WASM}}
      - npx jco transpile {{.OUTPUT_WASM}} -o transpiled/

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - node --test tests/*.test.js

  coverage:
    desc: Run tests with coverage (builds first, 100% threshold)
    deps: [build]
    cmds:
      - >-
        node --test --experimental-test-coverage
        --test-coverage-include='src/**'
        --test-coverage-lines=100
        --test-coverage-branches=100
        --test-coverage-functions=100
        tests/*.test.js

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf .coverage .nyc_output coverage output "$HARNESS_OUTPUT_DIR/javascript/component" test-results transpiled task-component.wasm

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf node_modules "$NPM_CONFIG_CACHE" "{{.TASKFILE_DIR}}/.harness"
